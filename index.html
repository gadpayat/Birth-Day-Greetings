<!DOCTYPE html>
<html>
<head>
  <title>Birthday Greeting</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    /* Top greeting banner */
    #birthdayBanner{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      background:linear-gradient(to right, #ff66cc, #9933ff);
      color:white;
      text-align:center;
      padding:18px;
      font-size:24px;
      font-weight:bold;
      z-index:9999;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);

      /* smooth fade */
      transition: opacity 1.5s ease;
    }

    /* Page content */
    .content{
      padding:100px 20px;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- Greeting Banner -->
<div id="birthdayBanner">
  🎂 Happy Birthday to all Birthday Celebrant for June! Wishing you happiness, success and many birthdays to come! 🎉
</div>

<!-- Main Content -->
<div class="content">
  <h1>Welcome to My Website</h1>
  <p>This is the homepage content.</p>
</div>

<script>

// Confetti when page loads
window.onload = () => {

  confetti({
    particleCount: 200,
    spread: 120,
    origin: { y: 0.2 }
  });

  // Hide banner after 1 minute
  setTimeout(() => {

    const banner = document.getElementById("birthdayBanner");

    banner.style.opacity = "0";

    // remove completely after fade animation
    setTimeout(() => {
      banner.style.display = "none";
    }, 1500);

  }, 60000); // 60000 = 1 minute

};

</script>

</body>
</html>
