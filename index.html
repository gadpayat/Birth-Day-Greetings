<!DOCTYPE html>
<html>
<head>
  <title>Birthday Greeting</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    /* Blinking animation */
    @keyframes blink {
      0%   { opacity: 1; }
      50%  { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* Top greeting banner */
    #birthdayBanner{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      background:linear-gradient(to right, #ff66cc, #9933ff);
      color:white;
      text-align:center;
      padding:18px;
      font-size:28px;
      font-weight:bold;
      z-index:9999;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);

      /* blinking effect */
      animation: blink 1s infinite;

      /* smooth fade */
      transition: opacity 1.5s ease;
    }

    .content{
      padding:100px 20px;
      text-align:center;
    }
  </style>
</head>

<body>

<!-- Greeting Banner -->
<div id="birthdayBanner">
  🎂 Happy Birthday to all Birthday Celebrant for June! Wishing you happiness, success and many birthdays to come! 🎉
</div>

<!-- Main Page Content -->
<div class="content">

</div>

<script>

// Confetti animation
window.onload = () => {

  confetti({
    particleCount: 300,
    spread: 150,
    origin: { y: 0.2 }
  });

  // Hide banner after 15 seconds
  setTimeout(() => {

    const banner = document.getElementById("birthdayBanner");

    banner.style.opacity = "0";

    setTimeout(() => {
      banner.style.display = "none";
    }, 5000);

  }, 30000);

};

</script>

</body>
</html>
