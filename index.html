<!DOCTYPE html>
<html>
<head>
  <title>Birthday Greeting</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>

    body{
      margin:0;
      overflow:hidden;
      background:transparent;
      font-family:Arial, sans-serif;
    }

    /* Slide-down animation */
    @keyframes slideDown {
      from{
        transform:translateY(-120px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    /* Blinking */
    @keyframes blink {
      0%{opacity:1;}
      50%{opacity:0.5;}
      100%{opacity:1;}
    }

    /* Floating balloons */
    @keyframes floatUp {
      from{
        transform:translateY(120vh);
      }
      to{
        transform:translateY(-150vh);
      }
    }

    /* Train passing text */
    @keyframes trainMove {

      0%{
        transform:translateX(100%);
      }

      100%{
        transform:translateX(-100%);
      }
    }

    /* Main Container */
    #container{

      position:relative;

      width:100%;
      overflow:hidden;

      transition:opacity 2s ease;
    }

    /* Banner */
    #birthdayBanner{

      width:100%;

      padding:20px 0;

      background:
      linear-gradient(to right,#ff3399,#00ffcc);

      color:white;

      font-size:35px;
      font-weight:bold;

      white-space:nowrap;
      overflow:hidden;

      box-shadow:0 4px 15px rgba(0,0,0,0.3);

      animation:
      slideDown 1.5s ease,
      blink 2s infinite;
    }

    /* Moving train text */
    #movingText{

      display:inline-block;

      padding-left:100%;

      animation:
      trainMove 30s linear infinite;
    }

    /* Balloons */
    .balloon{

      position:fixed;

      bottom:-150px;

      width:60px;
      height:80px;

      border-radius:50%;

      opacity:0.8;

      animation:
      floatUp linear infinite;

      z-index:1;
    }

    .balloon::after{

      content:'';

      position:absolute;

      width:2px;
      height:60px;

      background:white;

      left:50%;
      top:80px;
    }

  </style>
</head>

<body>

<div id="container">

  <!-- Birthday Music -->
  <audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mpeg">
  </audio>

  <!-- Balloons -->
  <div class="balloon"
       style="left:5%;
       background:red;
       animation-duration:10s;">
  </div>

  <div class="balloon"
       style="left:20%;
       background:yellow;
       animation-duration:12s;">
  </div>

  <div class="balloon"
       style="left:40%;
       background:cyan;
       animation-duration:9s;">
  </div>

  <div class="balloon"
       style="left:60%;
       background:pink;
       animation-duration:11s;">
  </div>

  <div class="balloon"
       style="left:80%;
       background:lime;
       animation-duration:13s;">
  </div>

  <!-- Banner -->
  <div id="birthdayBanner">

    <div id="movingText">

      🎂 Happy Birthday to all Birthday Celebrant for June!
       Wishing you happiness, love,
      success, endless blessings, and many more Birthdays to come! 🎈🎊

    </div>

  </div>

</div>

<script>

window.onload = () => {

  // Main confetti
  confetti({
    particleCount:250,
    spread:120,
    origin:{ y:0.3 }
  });

  // Side confetti
  setTimeout(() => {

    confetti({
      particleCount:120,
      angle:60,
      spread:80,
      origin:{ x:0 }
    });

    confetti({
      particleCount:120,
      angle:120,
      spread:80,
      origin:{ x:1 }
    });

  }, 500);

  // Remove EVERYTHING after 20 seconds
  setTimeout(() => {

    const container =
    document.getElementById("container");

    container.style.opacity = "0";

    setTimeout(() => {

      container.style.display = "none";

    }, 5000);

  }, 30000);

};

</script>

</body>
</html>
